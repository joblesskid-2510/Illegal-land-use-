version: "3.9"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./illegal-land-75241315c879.json:/app/illegal-land-75241315c879.json:ro
    depends_on:
      - postgis

  postgis:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: landwatch
      POSTGRES_USER: landwatch
      POSTGRES_PASSWORD: landwatch_secret_2024
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.0
    ports:
      - "5000:5000"
    command: mlflow server --host 0.0.0.0 --port 5000

volumes:
  pgdata:
